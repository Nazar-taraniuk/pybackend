# ──────────────────────────────────────────────────────────────────────────────
# Grafana dashboard provisioning — автоматично завантажує дашборди з папки
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: 1

providers:
  - name: "default"
    orgId: 1
    folder: "PyBackend"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards
